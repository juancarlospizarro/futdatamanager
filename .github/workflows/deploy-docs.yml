name: Deploy Documentation

# Ejecutar en modificaciones en las siguientes ramas
on:
  push:
    branches:
      - main

# Permisos necesarios para publicar la web
permissions:
  contents: write

# Los pasos que hará github en la nube
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13 # Versión que uso

      - name: Instalar MkDocs y dependencias
        run: |
          pip install mkdocs-material 
          pip install "mkdocstrings[python]"
          pip install django

      - name: Construir y desplegar en GitHub Pages
        run: mkdocs gh-deploy --force